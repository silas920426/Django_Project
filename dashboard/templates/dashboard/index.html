{% extends 'base.html' %}

{% block content %}

<h3>設備報修系統</h3>

<div class="row">

  <div class="col-md-3">
    <div class="card p-3">設備數：{{ equipment_count }}</div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">待處理：{{ pending }}</div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">維修中：{{ repairing }}</div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">已完成：{{ completed }}</div>
  </div>

</div>

{% endblock %}
