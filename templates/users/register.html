{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">📝 申請新帳號</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        <script>document.getElementById('{{ field.id_for_label }}').classList.add('form-control');</script>
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                        {% if field.help_text %}
                            <div class="text-muted small mt-1">{{ field.help_text }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    
                    <hr>
                    <div class="d-flex justify-content-between align-items-center">
                        <a href="{% url 'login' %}" class="text-decoration-none">返回登入頁</a>
                        <button type="submit" class="btn btn-primary px-4">送出申請</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
