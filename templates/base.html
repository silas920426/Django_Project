<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設備報修管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3 mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/dashboard/">設備報修管理系統</a>

    <div class="d-flex align-items-center ms-auto">
      
      <span class="navbar-text text-white me-4">
          👤 您好，<strong>{{ user.username }}</strong> 
          <span class="badge bg-info text-dark ms-1 fw-bold">
              {% if user.is_superuser %}
                  超級管理員
              {% else %}
                  {{ user.profile.get_role_display }}
              {% endif %}
          </span>
      </span>

      <div>
        <a href="/users/contacts/" class="btn btn-sm btn-light me-1">員工資料</a>
        
        <a href="/departments/" class="btn btn-sm btn-light me-1">部門</a>
        <a href="/equipments/" class="btn btn-sm btn-light me-1">設備</a>
        <a href="/tickets/" class="btn btn-sm btn-light me-1">報修</a>
        
        <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-danger">登出</button>
        </form>
      </div>

    </div>
  </div>
</nav>
{% endif %}

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
