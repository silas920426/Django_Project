{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">{% if form.instance.pk %}✏️ 編輯部門{% else %}➕ 新增部門{% endif %}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    
                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">取消返回</a>
                        <button type="submit" class="btn btn-success">儲存部門</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
