{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-warning text-dark">
                <h5 class="mb-0">{% if form.instance.pk %}🔧 編輯報修單編號 #{{ form.instance.id }}{% else %}📝 填寫新設備故障報修單{% endif %}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">{{ field.label }}</label>
                        {{ field }}
                        {% for error in field.errors %}
                            <div class="text-danger small mt-1">{{ error }}</div>
                        {% endfor %}
                    </div>
                    {% endfor %}
                    
                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'ticket_list' %}" class="btn btn-outline-secondary">返回</a>
                        <button type="submit" class="btn btn-warning fw-bold">確認送出</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
