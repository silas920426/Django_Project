{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">查看報修單詳細內容 (單號 #{{ ticket.id }})</h5>
                <span class="badge bg-light text-dark">只能觀看不能修改</span>
            </div>
            <div class="card-body">
                
                <div>
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">{{ field.label }}</label>
                        {{ field.as_widget|safe }}
                        <script>
                            // 透過簡單的 JavaScript 自動把這個欄位鎖定
                            document.getElementById('{{ field.id_for_label }}').disabled = true;
                        </script>
                    </div>
                    {% endfor %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-muted">目前報修單狀態</label>
                        <input type="text" class="form-control" value="{{ ticket.get_status_display }}" disabled>
                    </div>
                </div>
                
                <hr>
                
                <form method="POST" action="">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'ticket_list' %}" class="btn btn-secondary">⬅️ 返回列表</a>
                        
                        {% if ticket.status != 'completed' %}
                            <button type="submit" name="mark_processed" class="btn btn-success fw-bold" onclick="return confirm('確認此報修案件已維修完畢，並要將設備恢復為正常狀態嗎？');">✅ 標記為已處理</button>
                        {% else %}
                            <span class="text-success fw-bold align-self-center">處理完畢</span>
                        {% endif %}
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
